services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sat
      POSTGRES_USER: sat
      POSTGRES_PASSWORD: sat
    ports:
      - "5432:5432"
    volumes:
      - sat_postgres_data:/var/lib/postgresql/data

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"

volumes:
  sat_postgres_data:
